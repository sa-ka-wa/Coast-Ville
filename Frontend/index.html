<!-- public/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#1890ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="RentManager" />
    <meta name="application-name" content="RentManager" />
    <meta
      name="description"
      content="RentManager - Property Management System"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json?v=2" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png?v=2" />

    <script>
      if ("serviceWorker" in navigator) {
        const isLocalhost = ["localhost", "127.0.0.1", "0.0.0.0"].includes(
          window.location.hostname,
        );

        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => {
            if (isLocalhost) {
              registration.unregister();
            }
          });
        });
      }
    </script>

    <title>RentManager - Property Management</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
